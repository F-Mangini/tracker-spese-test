<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpesaTracker</title>
    <meta name="description" content="Traccia le tue spese quotidiane">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header -->
    <header id="app-header">
        <h1>💰 SpesaTracker</h1>
        <button id="theme-toggle" aria-label="Cambia tema">🌓</button>
    </header>

    <!-- Main Content -->
    <main id="app-main">

        <!-- Timeline Page -->
        <section id="page-timeline" class="page active">
            <div id="timeline-summary"></div>
            <div id="timeline-content"></div>
            <div id="timeline-empty" class="empty-state hidden">
                <div class="empty-icon">📝</div>
                <p class="empty-title">Nessuna spesa registrata</p>
                <p class="empty-hint">Scrivi qualcosa come <strong>"caffè 1.50"</strong> qui sotto per iniziare!</p>
            </div>
        </section>

        <!-- Stats Page -->
        <section id="page-stats" class="page hidden">
            <div id="stats-content"></div>
        </section>

        <!-- Settings Page -->
        <section id="page-settings" class="page hidden">
            <div id="settings-content"></div>
        </section>
    </main>

    <!-- Input Bar -->
    <div id="input-bar">
        <div class="input-wrapper">
            <input
                type="text"
                id="expense-input"
                placeholder='es: caffè 1.50'
                autocomplete="off"
                enterkeyhint="send"
            >
            <button id="btn-voice" aria-label="Dettatura vocale" title="Detta a voce">🎤</button>
            <button id="btn-send" aria-label="Aggiungi spesa" title="Aggiungi">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-btn active" data-page="timeline">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Timeline</span>
        </button>
        <button class="nav-btn" data-page="stats">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Statistiche</span>
        </button>
        <button class="nav-btn" data-page="settings">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Impostazioni</span>
        </button>
    </nav>

    <!-- Edit Modal -->
    <div id="modal-overlay" class="overlay hidden">
        <div id="edit-modal" class="modal">
            <div class="modal-header">
                <h2>Modifica Spesa</h2>
                <button id="modal-close" class="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="edit-importo">Importo (€)</label>
                    <input type="number" id="edit-importo" step="0.01" min="0" inputmode="decimal">
                </div>
                <div class="form-group">
                    <label for="edit-descrizione">Descrizione</label>
                    <input type="text" id="edit-descrizione">
                </div>
                <div class="form-group">
                    <label for="edit-categoria">Categoria</label>
                    <select id="edit-categoria"></select>
                </div>
                <div class="form-group">
                    <label for="edit-metodo">Pagamento</label>
                    <select id="edit-metodo"></select>
                </div>
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="edit-data">Data</label>
                        <input type="date" id="edit-data">
                    </div>
                    <div class="form-group flex-1">
                        <label for="edit-ora">Ora</label>
                        <input type="time" id="edit-ora">
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit-nota">Nota (opzionale)</label>
                    <textarea id="edit-nota" rows="2" placeholder="Aggiungi una nota..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-delete" class="btn btn-danger">🗑️ Elimina</button>
                <button id="btn-save" class="btn btn-primary">💾 Salva</button>
            </div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div id="confirm-overlay" class="overlay hidden">
        <div id="confirm-dialog" class="modal modal-sm">
            <p id="confirm-message"></p>
            <div class="confirm-buttons">
                <button id="confirm-no" class="btn btn-secondary">Annulla</button>
                <button id="confirm-yes" class="btn btn-danger">Elimina</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>

    <!-- Scripts -->
    <script src="js/categories.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
