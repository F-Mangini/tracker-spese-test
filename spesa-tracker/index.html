<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpesaTracker</title>
    <meta name="description" content="Traccia le tue spese quotidiane">
    <meta name="theme-color" content="#10b981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header id="app-header">
        <h1>💰 SpesaTracker v1.1.1</h1>
        <div class="header-actions">
            <button id="btn-filter-toggle" class="header-btn" aria-label="Filtri" title="Filtri e ricerca">
                🔍
                <span id="filter-badge" class="filter-badge hidden">0</span>
            </button>
            <button id="theme-toggle" class="header-btn" aria-label="Cambia tema">🌓</button>
        </div>
    </header>

    <!-- ===== FILTER PANEL ===== -->
    <div id="filter-panel" class="filter-panel hidden">
        <div class="filter-panel-scroll">

            <div class="filter-section">
                <div class="filter-input-row">
                    <span class="filter-input-icon">🔍</span>
                    <textarea id="search-input" rows="1" placeholder="Cerca nelle spese..." enterkeyhint="search"></textarea>
                    <button id="btn-search-clear" class="filter-x-btn hidden">&times;</button>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-label">📅 Periodo</div>
                <div class="date-filter-row">
                    <div class="date-field">
                        <label for="filter-date-from">Da</label>
                        <input type="date" id="filter-date-from">
                    </div>
                    <div class="date-field">
                        <label for="filter-date-to">A</label>
                        <input type="date" id="filter-date-to">
                    </div>
                </div>
            </div>

            <div id="advanced-filters" class="advanced-filters hidden">
                <div class="filter-section">
                    <div class="filter-label">💰 Importo</div>
                    <div class="slider-container">
                        <div class="slider-values">
                            <span id="slider-val-min">€0</span>
                            <span id="slider-val-max">€100</span>
                        </div>
                        <div class="dual-slider" id="dual-slider">
                            <input type="range" id="slider-min" min="0" max="100" value="0" step="1">
                            <input type="range" id="slider-max" min="0" max="100" value="100" step="1">
                            <div class="ds-track">
                                <div class="ds-fill" id="ds-fill"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="filter-section">
                    <div class="filter-label">💳 Pagamento</div>
                    <div class="filter-chips" id="filter-methods"></div>
                </div>

                <div class="filter-section">
                    <div class="filter-label">📂 Categorie</div>
                    <div class="filter-chips" id="filter-cats"></div>
                </div>
            </div>

            <div class="filter-footer">
                <div class="filter-footer-left">
                    <button id="btn-filter-reset" class="btn-filter-reset hidden">✕ Reset</button>
                    <span id="filter-info" class="filter-info"></span>
                </div>
                <button id="btn-advanced-toggle" class="btn-advanced-toggle" aria-label="Mostra filtri avanzati"
                    title="Filtri avanzati">
                    <svg class="chevron-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <main id="app-main">
        <section id="page-timeline" class="page active">
            <div id="timeline-summary"></div>
            <div id="timeline-content"></div>
            <div id="timeline-empty" class="empty-state hidden">
                <div class="empty-icon">📝</div>
                <p class="empty-title">Nessuna spesa registrata</p>
                <p class="empty-hint">Scrivi qualcosa come <strong>"caffè 1.50"</strong> qui sotto!</p>
            </div>
        </section>

        <section id="page-stats" class="page hidden">
            <div id="stats-content"></div>
        </section>

        <section id="page-settings" class="page hidden">
            <div id="settings-content"></div>
        </section>
    </main>

    <div id="input-bar">
        <div class="input-wrapper">
            <textarea id="expense-input" rows="1" placeholder='es: caffè 1.50' enterkeyhint="send"></textarea>
            <button id="btn-voice" aria-label="Dettatura vocale">🎤</button>
            <button id="btn-send" aria-label="Aggiungi spesa">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                </svg>
            </button>
        </div>
    </div>

    <nav id="bottom-nav">
        <button class="nav-btn active" data-page="timeline">
            <span class="nav-icon">📋</span><span class="nav-label">Timeline</span>
        </button>
        <button class="nav-btn" data-page="stats">
            <span class="nav-icon">📊</span><span class="nav-label">Statistiche</span>
        </button>
        <button class="nav-btn" data-page="settings">
            <span class="nav-icon">⚙️</span><span class="nav-label">Impostazioni</span>
        </button>
    </nav>

    <!-- Edit Modal -->
    <div id="modal-overlay" class="overlay hidden">
        <div id="edit-modal" class="modal">
            <div class="modal-header">
                <h2>Modifica Spesa</h2>
                <button id="modal-close" class="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="edit-importo">Importo (€)</label>
                        <textarea id="edit-importo" rows="1" inputmode="decimal" enterkeyhint="done"></textarea>
                    </div>
                    <div class="form-group flex-1">
                        <label>Pagamento</label>
                        <div class="searchable-dropdown" id="sd-metodo"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit-descrizione">Descrizione</label>
                    <textarea id="edit-descrizione" rows="1" enterkeyhint="done"></textarea>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <div class="searchable-dropdown" id="sd-categoria"></div>
                </div>
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="edit-data">Data</label>
                        <input type="date" id="edit-data">
                    </div>
                    <div class="form-group flex-1">
                        <label for="edit-ora">Ora</label>
                        <input type="time" id="edit-ora">
                    </div>
                </div>
                <div class="form-group">
                    <label>Tag</label>
                    <div class="tag-input-container" id="tag-container">
                        <div class="tag-chips" id="tag-chips"></div>
                        <div class="searchable-dropdown tag-dropdown" id="sd-tags">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit-nota">Nota</label>
                    <textarea id="edit-nota" rows="2" placeholder="Aggiungi una nota..." enterkeyhint="done"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-delete" class="btn btn-danger">🗑️ Elimina</button>
                <button id="btn-save" class="btn btn-primary">💾 Salva</button>
            </div>
        </div>
    </div>

    <div id="confirm-overlay" class="overlay hidden">
        <div id="confirm-dialog" class="modal modal-sm">
            <p id="confirm-message"></p>
            <div class="confirm-buttons">
                <button id="confirm-no" class="btn btn-secondary">Annulla</button>
                <button id="confirm-yes" class="btn btn-danger">Elimina</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="js/categories.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
