name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - codex/refactor
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout stable branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: stable-src

      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: codex/refactor
          path: dev-src

      - name: Build Pages artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p public public/stable public/dev

          app_source() {
            local base="$1"
            if [ -d "$base/app" ]; then
              echo "$base/app"
            elif [ -d "$base/spesa-tracker" ]; then
              echo "$base/spesa-tracker"
            else
              echo "Missing static app directory in $base" >&2
              exit 1
            fi
          }

          stable_app="$(app_source stable-src)"
          dev_app="$(app_source dev-src)"

          cp -R "$stable_app"/. public/
          cp -R "$stable_app"/. public/stable/
          cp -R "$dev_app"/. public/dev/

          cat > public/dev/js/config.js <<'EOF'
          /* ============================================
             CONFIG - DEV CHANNEL
             ============================================ */

          window.SPESA_TRACKER_CONFIG = {
              storageKey: 'spesa-tracker-data-dev',
              channel: 'dev'
          };
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
