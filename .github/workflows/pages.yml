name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout stable branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: stable-src

      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: codex/refactor
          path: dev-src

      - name: Build Pages artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p public public/stable public/dev

          cp -R stable-src/app/. public/
          cp -R stable-src/app/. public/stable/
          cp -R dev-src/app/. public/dev/
          cp dev-src/app/manifest.dev.json public/dev/manifest.json

          sed -i \
            -e 's#icons/stable/favicon-32.png#icons/dev/favicon-32.png#g' \
            -e 's#icons/stable/favicon-16.png#icons/dev/favicon-16.png#g' \
            -e 's#icons/stable/apple-touch-icon.png#icons/dev/apple-touch-icon.png#g' \
            public/dev/index.html

          cat > public/dev/js/config.js <<'EOF'
          /* ============================================
             CONFIG - DEV CHANNEL
             ============================================ */

          window.SPESA_TRACKER_CONFIG = {
              storageKey: 'spesa-tracker-data-dev',
              channel: 'dev'
          };
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
